name: booking_app
description: A mobile booking platform for services like clinics, salons, and tutors.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & Navigation
  cupertino_icons: ^1.0.2
  flutter_svg: ^2.0.7
  intl: ^0.19.0
  table_calendar: ^3.0.9


  # State Management
  provider: ^6.0.0

  # API & HTTP
  http: ^1.1.0
  dio: ^5.3.1
  socket_io_client: ^2.0.3

  # Local Storage
  shared_preferences: ^2.2.0
  hive: ^2.2.3
  flutter_secure_storage: ^9.0.0

  # Date & Time
  timezone: ^0.9.2

  # Image Loading
  cached_network_image: ^3.3.0

  # Notifications
  flutter_local_notifications: ^17.0.0

  #geolocator
  geolocator: ^11.0.0
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  image_picker: ^1.2.1
  url_launcher: ^6.3.2
  share_plus: ^12.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  hive_generator: ^2.0.0
  build_runner: ^2.4.6

flutter:
  uses-material-design: true

  assets:
    - assets/images/salon.png
    - assets/images/doc.png
    - assets/images/tutop.png

